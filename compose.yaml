services:
  htmlshare:
    build: .
    command: ["server"]
    environment:
      PORT: "8080"
      SHARE_TOKEN: "${SHARE_TOKEN:?set SHARE_TOKEN in .env}"
      HTMLSHARE_MAX_FILE_BYTES: "${HTMLSHARE_MAX_FILE_BYTES:-10485760}"
      HTMLSHARE_EVENT_LOG: "${HTMLSHARE_EVENT_LOG:-/data/events.jsonl}"
    volumes:
      - htmlshare_data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - htmlshare
    ports:
      - "443:443"
    environment:
      SHARE_DOMAIN: "${SHARE_DOMAIN:?set SHARE_DOMAIN in .env}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  htmlshare_data:
  caddy_data:
  caddy_config:
