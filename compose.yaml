services:
  htmlshare:
    build: .
    command: ["server"]
    environment:
      PORT: "8080"
      SHARE_TOKEN: "${SHARE_TOKEN:?set SHARE_TOKEN in .env}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      HTMLSHARE_MAX_FILE_BYTES: "${HTMLSHARE_MAX_FILE_BYTES:-10485760}"
      HTMLSHARE_EVENT_LOG: "${HTMLSHARE_EVENT_LOG:-/data/events.jsonl}"
      HTMLSHARE_LOG_UNMATCHED: "${HTMLSHARE_LOG_UNMATCHED:-0}"
      HTMLSHARE_LOG_DISCONNECTED: "${HTMLSHARE_LOG_DISCONNECTED:-0}"
      HTMLSHARE_MAX_PENDING_REQUESTS: "${HTMLSHARE_MAX_PENDING_REQUESTS:-100}"
      HTMLSHARE_MAX_PENDING_PER_SHARE: "${HTMLSHARE_MAX_PENDING_PER_SHARE:-10}"
    volumes:
      - htmlshare_data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - htmlshare
    ports:
      - "443:443"
    environment:
      SHARE_DOMAIN: "${SHARE_DOMAIN:?set SHARE_DOMAIN in .env}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  htmlshare_data:
  caddy_data:
  caddy_config:
